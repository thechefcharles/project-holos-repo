# Machine-readable data-source registry — the REPO owns this file (per CLAUDE.md source-of-truth model).
# This file is the authoritative registry of all data sources: IDs, URLs, acquisition status, and rights.
# [[VERIFY current dataset IDs on the Chicago Data Portal at build time.]]

coordinate_systems:
  storage_web: "EPSG:4326"
  engineering: "EPSG:3435"   # IL State Plane East, US ft
  vertical: "EPSG:5703"      # NAVD88

chicago:
  socrata_base: "https://data.cityofchicago.org/resource"

  # Flat dataset mapping for holos harvest socrata CLI
  datasets:
    street_center_lines: "6imu-meau"
    ward_boundaries_2023: "p293-wvbd"
    ward_offices: "f4sz-sn2p"
    service_requests_311: "v6vf-nfxy"
    building_footprints: "a2nx-4u46"

  # Reference layers (public, no special rights needed)
  reference_data:
    street_center_lines:
      id: "6imu-meau"
      tier: "public"
      rights: "public-record"
      status: "available"
      role: "geocoding backbone; required for Phase 1"

    ward_boundaries_2023:
      id: "p293-wvbd"
      tier: "public"
      rights: "public-record"
      status: "available"
      role: "containment validation; ward-based analytics"

    ward_offices:
      id: "f4sz-sn2p"
      tier: "public"
      rights: "public-record"
      status: "available"
      role: "aldermanic context for spend analysis"

    service_requests_311:
      id: "v6vf-nfxy"
      tier: "public"
      rights: "public-record"
      status: "available"
      role: "need-match baseline; Tool 1 (Money Map)"

    # address_points:
    #   id: "[[verify on portal]]"
    #   tier: "public"
    #   rights: "public-record"
    #   status: "to_verify"
    #   role: "exact-match geocoding stage"

    building_footprints:
      id: "a2nx-4u46"
      tier: "public"
      rights: "public-record"
      status: "in_hand"
      role: "alley/street width measurement; Phase 1 Step 4"
      notes: |
        Chicago building outlines dataset; used for measuring alley/street widths.
        For Phase 1 pilot: using sample data (data/ward01_building_footprints_sample.geojson).
        Production load: will use full Chicago Data Portal dataset when dataset ID verified.

    # Gazetteer data (named-place geocoding stage)
    chicago_parks:
      id: "[[verify_on_portal]]"
      tier: "public"
      rights: "public-record"
      status: "available"
      role: "named-place geocoding (stage 5 gazetteer); Tier 2 Part 2"
      notes: |
        Chicago parks and recreational facilities. Used for matching location strings
        like "GRANT PARK", "MILLENNIUM PARK", "LINCOLN PARK", etc.
        Provides: name, centroid (geometry), type, address.
        Expected records: 600+ parks and facilities
        Expected geocoding gain: +1pp citywide (25 records at 70% success rate)

    public_facilities:
      id: "[[verify_on_portal]]"
      tier: "public"
      rights: "public-record"
      status: "available"
      role: "named-place geocoding (stage 5 gazetteer); Tier 2 Part 2"
      notes: |
        Chicago public facilities: libraries, police stations, fire stations, etc.
        Used to match named locations not in parks dataset.
        Sources: Chicago Library system, CPD, CFD public data

    # building_permits:
    #   id: "[[verify on portal]]"
    #   tier: "public"
    #   rights: "public-record"
    #   status: "to_verify"
    #   role: "change-detection feed (Gap 16)"

  # Menu (AMP) spending PDFs — Phase 1A source
  menu_pdfs:
    tier: "public"
    rights: "public-record"
    status: "in_hand"
    role: "Aldermanic Menu Fund spending; data for Tool 1"
    # Real archive: Chicago OBM Publications page (JavaScript-rendered)
    archive_url: "https://www.chicago.gov/city/en/depts/obm/provdrs/budget/svcs/PublicationsArchive.html"
    archive_section: "Aldermanic Menu Reports"  # Section to scrape from page
    discovery_method: "playwright"  # Use Playwright for JS-rendered page
    # Legacy patterns (kept for reference, but archive_url is authoritative now)
    url_patterns:
      - "general/CIP/CIPDocs/AldermanicMenuPostings/{YEAR}Menu.pdf"           # older (2005–~2014)
      - "supp_info/CIP_Archive/Aldermanic Menu/Quarterly Menu Reports Q{N} {YEAR}.pdf"  # newer quarterly
    notes: |
      Chicago publishes aldermanic menu reports via:
      1. Publications Archive page (JS-rendered) for 2012–present
      2. Harvester uses Playwright to scrape page and extract PDF links
      3. Each year's section expandable to show all reports for that year

ward_wise:
  tier: "public"
  rights: "public-record"
  status: "in_hand"
  role: "answer-key benchmark + permitted bootstrap source (Phase 1)"
  api: "https://www.wardwisechicago.org/api/spendingitems"
  repo: "https://github.com/ward-wise/data-analysis"
  label_requirement: "Never ship data without labeling it Ward Wise-derived"

census:
  tier: "public"
  rights: "public-record"
  status: "available"
  role: "demographic context; Tool 1 (income/population)"
  acs_api: "https://api.census.gov/data"
  tables:
    median_household_income: "B19013"

# Gated & special-rights sources (Phase 2+)
gated:
  terra_engineering_plans:
    tier: "gated"
    rights: "permission-granted"
    status: "in_hand"
    role: "Phase 3: B1 vector PDF extraction; partner relationship"
    format: "PDF"

  ouc_utility_records:
    tier: "gated"
    rights: "permission-pending"
    status: "to_obtain"
    role: "Phase 3: utility master records from OUC agencies"

  private_utilities:
    tier: "gated"
    rights: "permission-pending"
    status: "legal_gate"
    role: "ComEd/Peoples Gas/AT&T records (legal constraint; ops.data_rights required)"
    note: "No ingestion without explicit permission row in ops.data_rights"

  dwm_break_history:
    tier: "gated"
    rights: "foia"
    status: "foia_filed"
    role: "Phase 4: survival-model training labels for maintenance forecasting (Gap 4)"
    note: "Filed as FOIA request; months of lead time expected"
