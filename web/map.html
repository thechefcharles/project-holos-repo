<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Holos — 2012 Menu Spending Map</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js" integrity="sha384-C8SvKhT0WT55AOw5pvwVG699JuuZgN0KFt/4wtpRPhSl+TzRYqDUravAfuy13vJK" crossorigin="anonymous"></script>
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" integrity="sha384-lwiCiEXwjwuSiTeYhtgeL/ADQBiUjDsQkKHCwT0j+8iKuBrb7skjKQAYQ+cpZspI" crossorigin="anonymous" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
            max-width: 300px;
        }
        .controls h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
        }
        .controls label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #555;
        }
        .controls select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .stats {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
            border-top: 1px solid #eee;
            padding-top: 12px;
            margin-top: 12px;
        }
        .stats-number {
            font-weight: bold;
            color: #333;
        }
        .popup {
            max-width: 280px;
        }
        .popup-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        .popup-item {
            font-size: 12px;
            margin-bottom: 6px;
            color: #555;
        }
        .popup-label {
            font-weight: 600;
            color: #333;
        }
        .popup-cost {
            color: #0066cc;
            font-weight: bold;
            font-size: 13px;
        }
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
            font-size: 12px;
            color: #666;
        }
        .legend-item {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .legend-swatch {
            width: 30px;
            height: 3px;
            margin-right: 8px;
            border-radius: 2px;
        }
        .error {
            color: #c33;
            padding: 10px;
            background: #fee;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="controls">
        <h2>🗺️ 2012 Menu Spending</h2>
        <div id="error" class="error" style="display:none;"></div>
        <label for="ward-filter">Filter by Ward:</label>
        <select id="ward-filter">
            <option value="">All Wards</option>
        </select>
        <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 12px;">
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="toggle-wards" style="margin-right: 8px; cursor: pointer;">
                <span>Show Ward Boundaries</span>
            </label>
            <label style="display: flex; align-items: center; cursor: pointer; margin-top: 8px;">
                <input type="checkbox" id="toggle-2012-real" style="margin-right: 8px; cursor: pointer;" checked>
                <span>Show 2012 Real Data (Wards 1-10)</span>
            </label>
        </div>
        <div class="stats">
            <div><span class="stats-number" id="displayed-count">0</span> records displayed</div>
            <div><span class="stats-number" id="total-count">0</span> total 2012 records</div>
            <div><span class="stats-number" id="geocoding-rate">0%</span> geocoded</div>
        </div>
    </div>
    <div class="legend">
        <div style="font-weight: bold; margin-bottom: 10px;">Geometry Types</div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: #0066cc;"></div>
            <span>Points (intersections, single addresses)</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: #ff6600;"></div>
            <span>Lines (street ranges)</span>
        </div>
        <div style="font-weight: bold; margin-top: 10px; margin-bottom: 5px;">Cost</div>
        <div style="font-size: 11px; color: #888;">Line width = cost amount. Click features for details.</div>
    </div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                name: 'OSM Bright',
                sources: {
                    osm: {
                        type: 'raster',
                        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        attribution: '© OpenStreetMap contributors'
                    }
                },
                layers: [
                    {
                        id: 'osm',
                        type: 'raster',
                        source: 'osm'
                    }
                ]
            },
            center: [-87.6298, 41.8781],
            zoom: 10,
            attributionControl: true
        });

        let allFeatures = [];
        let geojsonData = null;
        let wardsData = null;
        let realData2012 = null;

        // Load real 2012 data (extracted + geocoded, wards 1-10)
        console.log('Loading real 2012 data...');
        fetch('2012_wards_1_10.geojson')
            .then(res => {
                console.log('2012 real data response:', res.status);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            })
            .then(data => {
                console.log('2012 real data loaded:', data.features.length, 'features');
                realData2012 = data;
            })
            .catch(err => console.error('Error loading 2012 real data:', err));

        // Load ward boundaries
        console.log('Loading ward boundaries...');
        fetch('wards_2023.geojson')
            .then(res => {
                console.log('Wards response:', res.status);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            })
            .then(data => {
                console.log('Wards loaded:', data.features.length, 'wards');
                wardsData = data;
            })
            .catch(err => console.error('Error loading wards:', err));

        // Load GeoJSON
        console.log('Loading GeoJSON...');
        fetch('spending_2012.geojson')
            .then(res => {
                console.log('GeoJSON response:', res.status, res.statusText);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            })
            .then(data => {
                console.log('GeoJSON loaded:', data.features.length, 'features');
                geojsonData = data;
                allFeatures = data.features || [];

                // Update stats
                document.getElementById('total-count').textContent = data.metadata.total_records || 0;
                document.getElementById('geocoding-rate').textContent = data.metadata.geocoding_rate || '0%';

                // Build ward list from features
                const wards = new Set();
                allFeatures.forEach(f => {
                    if (f.properties.ward) wards.add(f.properties.ward);
                });
                const wardSelect = document.getElementById('ward-filter');
                Array.from(wards).sort((a, b) => a - b).forEach(w => {
                    const opt = document.createElement('option');
                    opt.value = w;
                    opt.textContent = `Ward ${w}`;
                    wardSelect.appendChild(opt);
                });

                // Add source and layers when map is ready
                map.on('load', () => {
                    addMapLayers();
                });
            })
            .catch(err => {
                const errorDiv = document.getElementById('error');
                errorDiv.style.display = 'block';
                errorDiv.textContent = `Error loading data: ${err.message}`;
            });

        function addMapLayers() {
            // Add ward boundaries source
            if (wardsData) {
                map.addSource('wards', {
                    type: 'geojson',
                    data: wardsData
                });

                // Ward boundary layer (hidden by default)
                map.addLayer({
                    id: 'ward-fill',
                    type: 'fill',
                    source: 'wards',
                    layout: { visibility: 'none' },
                    paint: {
                        'fill-color': '#808080',
                        'fill-opacity': 0.05
                    }
                });

                map.addLayer({
                    id: 'ward-outline',
                    type: 'line',
                    source: 'wards',
                    layout: { visibility: 'none' },
                    paint: {
                        'line-color': '#666',
                        'line-width': 2,
                        'line-opacity': 0.6
                    }
                });
            }

            // Add GeoJSON source
            map.addSource('spending', {
                type: 'geojson',
                data: {
                    type: 'FeatureCollection',
                    features: allFeatures
                }
            });

            // Points layer (intersections, single addresses)
            map.addLayer({
                id: 'spending-points',
                type: 'circle',
                source: 'spending',
                filter: ['==', ['geometry-type'], 'Point'],
                paint: {
                    'circle-radius': 5,
                    'circle-color': '#0066cc',
                    'circle-opacity': 0.7,
                    'circle-stroke-width': 1,
                    'circle-stroke-color': '#fff'
                }
            });

            // Lines layer (street ranges) — width by cost
            map.addLayer({
                id: 'spending-lines',
                type: 'line',
                source: 'spending',
                filter: ['==', ['geometry-type'], 'LineString'],
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#ff6600',
                    'line-width': [
                        'interpolate',
                        ['linear'],
                        ['get', 'cost'],
                        0, 1,
                        50000, 3,
                        200000, 8
                    ],
                    'line-opacity': 0.7
                }
            });

            // Polygons layer (alley blocks)
            map.addLayer({
                id: 'spending-polygons',
                type: 'fill',
                source: 'spending',
                filter: ['==', ['geometry-type'], 'Polygon'],
                paint: {
                    'fill-color': '#66cc00',
                    'fill-opacity': 0.3
                }
            });

            map.addLayer({
                id: 'spending-polygons-stroke',
                type: 'line',
                source: 'spending',
                filter: ['==', ['geometry-type'], 'Polygon'],
                paint: {
                    'line-color': '#66cc00',
                    'line-width': 2,
                    'line-opacity': 0.7
                }
            });

            // Click handler
            ['spending-points', 'spending-lines', 'spending-polygons'].forEach(layerId => {
                map.on('click', layerId, (e) => {
                    if (e.features.length === 0) return;
                    const props = e.features[0].properties;

                    const popup = new maplibregl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(`
                            <div class="popup">
                                <div class="popup-title">${props.category || 'Unknown'}</div>
                                <div class="popup-item"><span class="popup-label">Cost:</span> <span class="popup-cost">$${props.cost.toLocaleString()}</span></div>
                                <div class="popup-item"><span class="popup-label">Ward:</span> ${props.ward}</div>
                                <div class="popup-item"><span class="popup-label">Location:</span> ${props.location_text}</div>
                                <div class="popup-item"><span class="popup-label">Method:</span> ${props.method || 'unknown'}</div>
                                <div class="popup-item"><span class="popup-label">Confidence:</span> ${(props.confidence * 100).toFixed(0)}%</div>
                            </div>
                        `)
                        .addTo(map);
                });

                map.on('mouseenter', layerId, () => {
                    map.getCanvas().style.cursor = 'pointer';
                });

                map.on('mouseleave', layerId, () => {
                    map.getCanvas().style.cursor = '';
                });
            });

            // Ward filter
            document.getElementById('ward-filter').addEventListener('change', (e) => {
                const selectedWard = e.target.value;
                const filtered = selectedWard
                    ? allFeatures.filter(f => f.properties.ward == selectedWard)
                    : allFeatures;

                map.getSource('spending').setData({
                    type: 'FeatureCollection',
                    features: filtered
                });

                document.getElementById('displayed-count').textContent = filtered.length;
            });

            // Ward boundaries toggle
            document.getElementById('toggle-wards').addEventListener('change', (e) => {
                const visibility = e.target.checked ? 'visible' : 'none';
                map.setLayoutProperty('ward-fill', 'visibility', visibility);
                map.setLayoutProperty('ward-outline', 'visibility', visibility);
            });

            // Real 2012 data layer
            if (realData2012) {
                map.addSource('real-2012', {
                    type: 'geojson',
                    data: realData2012
                });

                // Red markers for real extracted/geocoded data
                map.addLayer({
                    id: 'real-2012-points',
                    type: 'circle',
                    source: 'real-2012',
                    paint: {
                        'circle-radius': 6,
                        'circle-color': '#cc0000',
                        'circle-opacity': 0.8,
                        'circle-stroke-width': 2,
                        'circle-stroke-color': '#fff'
                    }
                });

                // Click handler for real data
                map.on('click', 'real-2012-points', (e) => {
                    if (e.features.length === 0) return;
                    const props = e.features[0].properties;
                    new maplibregl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(`
                            <div class="popup">
                                <div class="popup-title">${props.category || 'Unknown'}</div>
                                <div class="popup-item"><span class="popup-label">Cost:</span> <span class="popup-cost">$${props.cost.toLocaleString()}</span></div>
                                <div class="popup-item"><span class="popup-label">Ward:</span> ${props.ward}</div>
                                <div class="popup-item"><span class="popup-label">Location:</span> ${props.location}</div>
                                <div class="popup-item"><span class="popup-label">Confidence:</span> ${(props.confidence * 100).toFixed(0)}%</div>
                                <div class="popup-item"><span class="popup-label">Source:</span> 2012 Extracted & Geocoded</div>
                            </div>
                        `)
                        .addTo(map);
                });

                map.on('mouseenter', 'real-2012-points', () => {
                    map.getCanvas().style.cursor = 'pointer';
                });

                map.on('mouseleave', 'real-2012-points', () => {
                    map.getCanvas().style.cursor = '';
                });
            }

            // Toggle real 2012 data
            document.getElementById('toggle-2012-real').addEventListener('change', (e) => {
                const visibility = e.target.checked ? 'visible' : 'none';
                if (map.getLayer('real-2012-points')) {
                    map.setLayoutProperty('real-2012-points', 'visibility', visibility);
                }
            });

            document.getElementById('displayed-count').textContent = allFeatures.length;
        }
    </script>
</body>
</html>
