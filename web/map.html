<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Holos — 2012 Menu Spending Map</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js" integrity="sha384-C8SvKhT0WT55AOw5pvwVG699JuuZgN0KFt/4wtpRPhSl+TzRYqDUravAfuy13vJK" crossorigin="anonymous"></script>
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" integrity="sha384-lwiCiEXwjwuSiTeYhtgeL/ADQBiUjDsQkKHCwT0j+8iKuBrb7skjKQAYQ+cpZspI" crossorigin="anonymous" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
            max-width: 300px;
        }
        .controls h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
        }
        .controls label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #555;
        }
        .controls select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .stats {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
            border-top: 1px solid #eee;
            padding-top: 12px;
            margin-top: 12px;
        }
        .stats-number {
            font-weight: bold;
            color: #333;
        }
        .popup {
            max-width: 280px;
        }
        .popup-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        .popup-item {
            font-size: 12px;
            margin-bottom: 6px;
            color: #555;
        }
        .popup-label {
            font-weight: 600;
            color: #333;
        }
        .popup-cost {
            color: #0066cc;
            font-weight: bold;
            font-size: 13px;
        }
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
            font-size: 12px;
            color: #666;
        }
        .legend-item {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .legend-swatch {
            width: 30px;
            height: 3px;
            margin-right: 8px;
            border-radius: 2px;
        }
        .error {
            color: #c33;
            padding: 10px;
            background: #fee;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="controls">
        <h2>🗺️ 2012 Menu Spending</h2>
        <div id="error" class="error" style="display:none;"></div>
        <label for="ward-filter">Filter by Ward:</label>
        <select id="ward-filter">
            <option value="">All Wards</option>
        </select>
        <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 12px;">
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="toggle-wards" style="margin-right: 8px; cursor: pointer;">
                <span>Show Ward Boundaries</span>
            </label>
        </div>
        <div class="stats">
            <div><span class="stats-number" id="displayed-count">0</span> / <span class="stats-number" id="total-count">0</span> geocoded</div>
            <div style="font-size: 11px; color: #888; margin-top: 8px;">
                <span id="geocoding-rate">0</span> extracted total
            </div>
        </div>
    </div>
    <div class="legend">
        <div style="font-weight: bold; margin-bottom: 10px;">2012 Geocoded Data</div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: #0066cc; border-radius: 50%; width: 8px; height: 8px; margin: auto;"></div>
            <span>Points (intersections) — blue</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: #ff6600; height: 2px;"></div>
            <span>Lines (ranges) — orange, width = cost</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: #66cc00; height: 2px;"></div>
            <span>Polygons (alleys) — green</span>
        </div>
        <div style="font-weight: bold; margin-top: 10px; font-size: 12px;">Note</div>
        <div style="font-size: 11px; color: #888;">
            Only geocoded records shown.<br>
            Ranges/segments didn't geocode in this dataset.
        </div>
        <div style="font-size: 11px; color: #888; margin-top: 6px;">
            Check console for out-of-ward records.
        </div>
    </div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                name: 'OSM Bright',
                sources: {
                    osm: {
                        type: 'raster',
                        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        attribution: '© OpenStreetMap contributors'
                    }
                },
                layers: [
                    {
                        id: 'osm',
                        type: 'raster',
                        source: 'osm'
                    }
                ]
            },
            center: [-87.6298, 41.8781],
            zoom: 10,
            attributionControl: true
        });

        let allFeatures = [];
        let realData2012 = null;
        let wardsData = null;

        // Load ward boundaries (reference layer)
        console.log('Loading ward boundaries...');
        fetch('wards_2023.geojson')
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            })
            .then(data => {
                console.log('Wards loaded:', data.features.length);
                wardsData = data;
            })
            .catch(err => console.error('Error loading wards:', err));

        // SINGLE DATA SOURCE: Real 2012 geocoded data (wards 1-10)
        console.log('Loading 2012 geocoded data (wards 1-10)...');
        fetch('2012_wards_1_10.geojson')
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            })
            .then(data => {
                console.log('2012 data loaded:', data.features.length, 'geocoded records');
                realData2012 = data;
                allFeatures = data.features || [];

                // Update stats - HONEST COUNT
                const metadata = data.metadata || {};
                const geocoded = metadata.total_geocoded || data.features.length;
                const extracted = metadata.total_extracted || '?';
                document.getElementById('total-count').textContent = geocoded;
                document.getElementById('displayed-count').textContent = geocoded;
                document.getElementById('geocoding-rate').textContent = extracted;

                // Build ward list from features
                const wards = new Set();
                allFeatures.forEach(f => {
                    if (f.properties.ward) wards.add(f.properties.ward);
                });
                const wardSelect = document.getElementById('ward-filter');
                Array.from(wards).sort((a, b) => a - b).forEach(w => {
                    const opt = document.createElement('option');
                    opt.value = w;
                    opt.textContent = `Ward ${w}`;
                    wardSelect.appendChild(opt);
                });

                // Add source and layers when map is ready
                map.on('load', () => {
                    addMapLayers();
                });
            })
            .catch(err => {
                const errorDiv = document.getElementById('error');
                errorDiv.style.display = 'block';
                errorDiv.textContent = `Error loading data: ${err.message}`;
            });

        function addMapLayers() {
            // Add ward boundaries source
            if (wardsData) {
                map.addSource('wards', {
                    type: 'geojson',
                    data: wardsData
                });

                // Ward boundary layer (hidden by default)
                map.addLayer({
                    id: 'ward-fill',
                    type: 'fill',
                    source: 'wards',
                    layout: { visibility: 'none' },
                    paint: {
                        'fill-color': '#808080',
                        'fill-opacity': 0.05
                    }
                });

                map.addLayer({
                    id: 'ward-outline',
                    type: 'line',
                    source: 'wards',
                    layout: { visibility: 'none' },
                    paint: {
                        'line-color': '#666',
                        'line-width': 2,
                        'line-opacity': 0.6
                    }
                });
            }

            // SINGLE REAL DATA SOURCE (2012 geocoded, wards 1-10)
            map.addSource('geocoded-2012', {
                type: 'geojson',
                data: {
                    type: 'FeatureCollection',
                    features: allFeatures
                }
            });

            // Single layer: all geometry types, colored by type
            // Points (intersections): blue
            // Lines (ranges): orange, width by cost
            // Polygons (alleys): green

            // Points layer (intersections, single addresses)
            map.addLayer({
                id: 'geocoded-points',
                type: 'circle',
                source: 'geocoded-2012',
                filter: ['==', ['geometry-type'], 'Point'],
                paint: {
                    'circle-radius': 5,
                    'circle-color': '#0066cc',
                    'circle-opacity': 0.7,
                    'circle-stroke-width': 1,
                    'circle-stroke-color': '#fff'
                }
            });

            // Lines layer (street ranges)
            map.addLayer({
                id: 'geocoded-lines',
                type: 'line',
                source: 'geocoded-2012',
                filter: ['==', ['geometry-type'], 'LineString'],
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#ff6600',
                    'line-width': [
                        'interpolate',
                        ['linear'],
                        ['get', 'cost'],
                        0, 1,
                        50000, 3,
                        200000, 8
                    ],
                    'line-opacity': 0.7
                }
            });

            // Polygons layer (alley blocks)
            map.addLayer({
                id: 'geocoded-polygons',
                type: 'fill',
                source: 'geocoded-2012',
                filter: ['==', ['geometry-type'], 'Polygon'],
                paint: {
                    'fill-color': '#66cc00',
                    'fill-opacity': 0.3
                }
            });

            map.addLayer({
                id: 'geocoded-polygons-stroke',
                type: 'line',
                source: 'geocoded-2012',
                filter: ['==', ['geometry-type'], 'Polygon'],
                paint: {
                    'line-color': '#66cc00',
                    'line-width': 2,
                    'line-opacity': 0.7
                }
            });

            // Click handler for all geometry types
            ['geocoded-points', 'geocoded-lines', 'geocoded-polygons'].forEach(layerId => {
                map.on('click', layerId, (e) => {
                    if (e.features.length === 0) return;
                    const props = e.features[0].properties;

                    const popup = new maplibregl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(`
                            <div class="popup">
                                <div class="popup-title">${props.category || 'Unknown'}</div>
                                <div class="popup-item"><span class="popup-label">Cost:</span> <span class="popup-cost">$${props.cost.toLocaleString()}</span></div>
                                <div class="popup-item"><span class="popup-label">Ward:</span> ${props.ward}</div>
                                <div class="popup-item"><span class="popup-label">Location:</span> ${props.location_text}</div>
                                <div class="popup-item"><span class="popup-label">Method:</span> ${props.method || 'unknown'}</div>
                                <div class="popup-item"><span class="popup-label">Confidence:</span> ${(props.confidence * 100).toFixed(0)}%</div>
                            </div>
                        `)
                        .addTo(map);
                });

                map.on('mouseenter', layerId, () => {
                    map.getCanvas().style.cursor = 'pointer';
                });

                map.on('mouseleave', layerId, () => {
                    map.getCanvas().style.cursor = '';
                });
            });

            // Ward filter (single real data source)
            document.getElementById('ward-filter').addEventListener('change', (e) => {
                const selectedWard = e.target.value;

                // Filter the real geocoded data
                const filtered = selectedWard
                    ? allFeatures.filter(f => f.properties.ward == selectedWard)
                    : allFeatures;

                map.getSource('geocoded-2012').setData({
                    type: 'FeatureCollection',
                    features: filtered
                });

                document.getElementById('displayed-count').textContent = filtered.length;

                // Check for records outside their ward (Verifier rule #6)
                const outOfWard = [];
                if (selectedWard) {
                    const selectedWardNum = parseInt(selectedWard);

                    filtered.forEach((f) => {
                        if (f.properties.ward !== selectedWardNum) {
                            outOfWard.push({
                                location: f.properties.location_text || f.properties.location || 'unknown',
                                ward: f.properties.ward,
                                expected: selectedWardNum
                            });
                        }
                    });
                    if (outOfWard.length > 0) {
                        console.warn(`⚠️ GEOCODING ERROR: ${outOfWard.length} record(s) fall outside their assigned ward:`, outOfWard);
                    } else {
                        console.log(`✓ All ${filtered.length} displayed records match Ward ${selectedWardNum}`);
                    }
                }
            });

            // Ward boundaries toggle
            document.getElementById('toggle-wards').addEventListener('change', (e) => {
                const visibility = e.target.checked ? 'visible' : 'none';
                map.setLayoutProperty('ward-fill', 'visibility', visibility);
                map.setLayoutProperty('ward-outline', 'visibility', visibility);
            });

        }
    </script>
</body>
</html>
